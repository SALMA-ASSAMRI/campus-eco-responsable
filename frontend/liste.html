<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Liste des signalements</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📋 Liste des signalements</h1>
    <p>Consultez les signalements écologiques enregistrés :</p>

    <table id="signalementsTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Type</th>
          <th>Lieu</th>
          <th>Auteur</th>
          <th>Description</th>
          <th>Date</th>
          <th>Statut</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <!-- Les lignes seront générées par JS -->
      </tbody>
    </table>

    <!-- ✅ Lien retour au formulaire -->
    <div class="form-actions">
      <a href="index.html">⬅️ Retour au formulaire</a>
    </div>
  </div>

  <script src="liste.js"></script>
</body>
</html>
