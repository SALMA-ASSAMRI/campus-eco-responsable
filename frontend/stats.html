<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Statistiques des signalements</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📊 Statistiques des signalements</h1>
    <p>Voici un résumé des signalements par statut :</p>

    <!-- Tableau des statistiques -->
    <table id="stats-table">
      <thead>
        <tr>
          <th>Statut</th>
          <th>Nombre</th>
          <th>Pourcentage</th>
        </tr>
      </thead>
      <tbody id="statsBody">
        <!-- Les lignes seront injectées par stats.js -->
      </tbody>
    </table>

    <!-- ✅ Zone message -->
    <div id="message" class="feedback"></div>

    <!-- ✅ Lien retour -->
    <div class="form-actions">
      <a href="index.html">⬅️ Retour au formulaire</a>
    </div>
  </div>

  <!-- ✅ Script JS -->
  <script src="stats.js"></script>
</body>
</html>
