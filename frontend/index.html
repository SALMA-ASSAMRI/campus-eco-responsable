<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Soumettre un signalement écologique</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🌱 Soumettre un signalement écologique</h1>
    <p class="subtitle">Signalez un problème écologique sur le campus</p>

    <!-- Formulaire de signalement -->
    <form id="signalementForm">
      <div class="form-group">
        <label for="type">Type de signalement :</label>
        <select id="type" name="type" required>
          <option value="Déchet">Déchet</option>
          <option value="Fuite d'eau">Fuite d'eau</option>
          <option value="Pollution">Pollution</option>
          <option value="Éclairage inutile">Éclairage inutile</option>
          <option value="Gaspillage énergie">Gaspillage énergie</option>
        </select>
      </div>

      <div class="form-group">
        <label for="lieu">Lieu :</label>
        <input type="text" id="lieu" name="lieu" placeholder="Ex: Salle C1" required>
      </div>

      <!-- ✅ Champ Nom -->
      <div class="form-group">
        <label for="nom">Nom :</label>
        <input type="text" id="nom" name="nom" placeholder="Votre nom ou prénom">
      </div>

      <div class="form-group">
        <label for="description">Description :</label>
        <textarea id="description" name="description" rows="4" placeholder="Décrivez le problème..." required></textarea>
      </div>

      <!-- ✅ Case anonymat -->
      <div class="form-group checkbox-group">
        <span class="checkbox-label">Envoyer anonymement</span>
        <input type="checkbox" id="anonyme" name="anonyme">
      </div>

      <!-- ✅ Zone des messages -->
      <div id="confirmationMessage"></div>
      <div id="suggestionBox" class="suggestion-box"></div>

      <!-- ✅ Bouton Soumettre pleine largeur -->
      <button type="submit" class="full-width">Soumettre</button>
    </form>

    <!-- ✅ Liens et autres actions -->
    <div class="form-actions">
      <button onclick="window.location.href='/export'" class="full-width">📤 Exporter en CSV</button>
      <a href="liste.html">📋 Voir la liste des signalements</a>
      <a href="stats.html">📊 Voir les statistiques</a>
    </div>
  </div>

  <!-- ✅ Script JS -->
  <script src="form.js"></script>
</body>
</html>
